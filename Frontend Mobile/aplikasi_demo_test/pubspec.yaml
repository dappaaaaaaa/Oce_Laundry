name: aplikasi_demo_test
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  filter_list: ^1.0.3
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.3
  currency_formatter: ^2.3.0
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.7.0
  awesome_dialog: ^3.2.1
  print_bluetooth_thermal: ^1.1.6
  permission_handler: ^12.0.0+1
  esc_pos_utils_plus: ^2.0.4
  blue_thermal_printer:
    git:
      url: https://github.com/XpieX/blue_thermal_printer.git
      ref: master
  icons_plus: ^5.0.0
  url_launcher: ^6.3.1
  dio: ^5.8.0+1
  email_validator: ^3.0.0
  loading_animation_widget: ^1.3.0
  choice: ^2.3.2
  bottom_sheet: ^4.0.4
  flutter_bloc: ^9.1.1
  keyboard_avoider: ^0.2.0
  flutter_keyboard_visibility: ^6.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite: ^2.0.0+4
  path: ^1.8.0
  intl: ^0.20.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/icon/logo.png
    - assets/icon/placeholder.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_app_name:
  name: "Qlaundy POS"
